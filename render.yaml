services:
  - type: web
    name: tbh-bosch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AI_PARSER_MODE
        value: mock
      - key: WEB_CONCURRENCY
        value: "1"
