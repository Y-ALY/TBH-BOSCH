<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Points | Privacy Guardian</title>
    <meta name="description" content="View and explore GDPR data points, retention deadlines, and compliance findings.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/dashboard.css?v=3">

    <script>
        if (localStorage.getItem("pg-theme") === "light") {
            document.documentElement.style.background = "#f3f4f8";
        }
    </script>

    <style>
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .back-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-link:hover {
            color: var(--accent-red);
            transform: translateX(-4px);
        }

        .data-points-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .data-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .data-card:hover {
            transform: translateY(-3px);
        }

        .data-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 1rem;
        }

        .data-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.35rem 0.85rem;
            border-radius: 99px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-danger {
            background-color: rgba(234,0,22,0.12);
            color: #ff4d6a;
            border: 1px solid rgba(234,0,22,0.2);
        }

        .status-warning {
            background-color: rgba(245,166,35,0.12);
            color: #f5a623;
            border: 1px solid rgba(245,166,35,0.2);
        }

        .status-success {
            background-color: rgba(16,185,129,0.12);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.2);
        }

        .status-info {
            background-color: rgba(0,123,192,0.12);
            color: var(--accent-blue);
            border: 1px solid rgba(0,123,192,0.2);
        }

        .data-card-body {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .data-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: auto;
            border-top: 1px solid var(--border-subtle);
            padding-top: 1rem;
        }

        .finding-tag {
            background: var(--bg-card-hover);
            padding: 0.35rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .findings-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="topbar">
        <div class="left-top">
            <button id="menuToggle" class="menu-btn">
                ☰
            </button>
            <span class="brand">Privacy Portal</span>
        </div>
        <div class="topbar-right" style="display: flex; align-items: center; gap: 14px;">
            <button class="menu-btn theme-toggle" id="themeToggleBtn" onclick="window.toggleDarkMode()" title="Toggle Theme" type="button"></button>
            <div class="account">
                <button class="account-btn" onclick="toggleAccountMenu()">
                    <div class="avatar-small">
                        {% if user %}{{ user.first_name[0] }}{{ user.last_name[0] }}{% else %}EA{% endif %}
                    </div>
                    <div class="account-info">
                        <strong>{% if user %}{{ user.first_name }} {{ user.last_name }}{% else %}Eyad Adly{% endif %}</strong>
                        <span>Employee</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <a href="/employee-dashboard#profile" id="nav-profile">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </span>
            <span class="label">Profile</span>
        </a>
        <a href="/employee-dashboard#alerts" id="nav-alerts">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </span>
            <span class="label">Flagged Files</span>
        </a>
        <a href="/employee-dashboard#overview" id="nav-overview">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            </span>
            <span class="label">Overview</span>
        </a>
        <a href="/employee-dashboard#actions" id="nav-actions">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </span>
            <span class="label">Actions</span>
        </a>
        <a href="/data-points" id="nav-data-points">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </span>
            <span class="label">Data Points</span>
        </a>
        <a href="/employee-directory" id="nav-employee-directory">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <span class="label">File Explorer</span>
        </a>
    </div>

    <div class="main" style="padding: 40px;">
        <header class="page-header reveal">
            <div>
                <a href="/employee-dashboard" class="back-link">
                    &larr; Back to Dashboard
                </a>
                <h1 id="page-title" style="margin-top: 1rem; background: var(--gradient-hero); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 8s ease infinite;">Loading Data Points...</h1>
            </div>
        </header>

        <section id="data-points-container" class="data-points-grid reveal">
            <!-- Data cards will be injected here -->
        </section>
    </div>

    <script>
        // Mapping of filters to page titles
        const titles = {
            'all': 'Total Files Data Points',
            'expiring': 'Expiring Soon Data Points',
            'delete': 'Delete Candidates Data Points',
            'clean': 'Compliance Score (Clean Files)'
        };

        async function loadDataPoints() {
            const urlParams = new URLSearchParams(window.location.search);
            const filter = urlParams.get('filter') || 'all';
            
            document.getElementById('page-title').textContent = titles[filter] || 'Data Points';
            
            const employeeId = "BX-21842";
            const container = document.getElementById('data-points-container');

            try {
                const response = await fetch(`/api/user-details/${employeeId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const files = data.files || [];

                const now = new Date();
                const thirtyDaysFromNow = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

                let filteredFiles = [];

                files.forEach(file => {
                    const deadline = new Date(file.retention_deadline);
                    const findings = file.findings || [];
                    const isClean = findings.length === 0;

                    if (filter === 'all') {
                        filteredFiles.push(file);
                    } else if (filter === 'delete' && deadline < now) {
                        filteredFiles.push(file);
                    } else if (filter === 'expiring' && deadline >= now && deadline <= thirtyDaysFromNow) {
                        filteredFiles.push(file);
                    } else if (filter === 'clean' && isClean) {
                        filteredFiles.push(file);
                    }
                });

                if (filteredFiles.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card empty-state">
                            No files found for this category.
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                filteredFiles.forEach(file => {
                    const deadline = new Date(file.retention_deadline);
                    let statusClass = 'status-info';
                    let statusText = 'Normal';
                    
                    if (deadline < now) {
                        statusClass = 'status-danger';
                        statusText = 'Overdue for Deletion';
                    } else if (deadline >= now && deadline <= thirtyDaysFromNow) {
                        statusClass = 'status-warning';
                        statusText = 'Expiring Soon';
                    } else if (file.findings && file.findings.length === 0) {
                        statusClass = 'status-success';
                        statusText = 'Clean / Compliant';
                    }

                    const findingsHtml = (file.findings && file.findings.length > 0) 
                        ? file.findings.map(f => `<span class="finding-tag">${f.category} (${f.risk_level})</span>`).join('')
                        : '<span style="color: var(--text-muted); font-size: 0.9rem;">No sensitive data found</span>';

                    const card = document.createElement('div');
                    card.className = 'glass-card data-card';
                    card.style.cursor = 'pointer';
                    card.onclick = () => {
                        window.location.href = `/user-details/${employeeId}`;
                    };
                    card.innerHTML = `
                        <div class="data-card-header">
                            <div class="data-card-title">
                                📄 ${file.file_id || 'Unknown Document'}
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="data-card-body">
                            <div>
                                <strong style="color: var(--text-primary);">Detected Entities:</strong>
                                <div class="findings-container">${findingsHtml}</div>
                            </div>
                        </div>
                        <div class="data-card-footer">
                            <span>Retention Deadline: ${deadline.toLocaleDateString()}</span>
                            <span>Findings: ${file.findings ? file.findings.length : 0}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading data points:", error);
                container.innerHTML = `
                    <div class="glass-card empty-state" style="border: 1px solid rgba(234,0,22,0.2);">
                        Failed to load data points. Please try again later.
                    </div>
                `;
            }
        }

        loadDataPoints();


    </script>
    <script src="/static/js/dashboard.js?v=3"></script>
</body>
</html>
