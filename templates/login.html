<!DOCTYPE html>
<html>

<head>
    <title>Privacy Guardian</title>

    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>

<div class="background-glow"></div>

<div class="login-container">

    <div class="left-panel">

        <div class="logo-bar"></div>

        <h1>Privacy Guardian</h1>

        <p>
            Securely manage personal data,
            retention policies,
            and GDPR compliance.
        </p>

    </div>

    <div class="login-card">

        <h2>Sign In</h2>

        <form action="/login" method="POST">

            <label>Account Type</label>

            <select name="role">

                <option value="employee">
                    Employee
                </option>

                <option value="admin">
                    Administrator
                </option>

            </select>

            <label>Email / Employee ID</label>

            <input
                type="text"
                name="email"
                placeholder="john.doe@company.com"
                required
            >

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

</body>

</html>
