<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User GDPR Profile — Privacy Portal</title>
<meta name="description" content="Complete GDPR data profile with retention countdown and flagged PII findings.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/css/dashboard.css?v=3">

<script>
    if (localStorage.getItem("pg-theme") === "light") {
        document.documentElement.style.background = "#f3f4f8";
    }
</script>

<style>
/* User Details specific styles */

.user-data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.data-card {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.data-card h3 {
    font-size: 18px;
    color: var(--text-primary);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.data-card .category-icon {
    font-size: 22px;
}

.data-snippet {
    background: var(--bg-card-hover);
    padding: 12px;
    border-radius: 8px;
    border-left: 3px solid var(--accent-blue);
    font-family: 'Space Grotesk', monospace;
    font-size: 13px;
    color: var(--text-secondary);
    word-break: break-all;
}

.data-reasoning {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
}

.data-status {
    margin-top: auto;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* GDPR Countdown Section */

.gdpr-countdown-section {
    margin-top: 60px;
    padding: 40px;
    text-align: center;
    border: 2px solid transparent;
}

.gdpr-countdown-section h2 {
    font-size: 28px;
    margin-bottom: 10px;
    color: var(--text-primary);
}

.gdpr-countdown-section p {
    color: var(--text-secondary);
    margin-bottom: 30px;
    font-size: 16px;
}

.countdown-timer {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
}

.time-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
}

.time-value {
    font-size: 48px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--accent-blue);
    line-height: 1;
    margin-bottom: 8px;
}

.time-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}

.expired-state .gdpr-countdown-section {
    border-color: var(--accent-red);
    background: rgba(234,0,22,0.04);
}

.expired-state .time-value {
    color: var(--accent-red);
}

.expired-message {
    display: none;
    font-size: 22px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    color: #ff4d6a;
    margin-top: 20px;
    padding: 15px;
    background: rgba(234,0,22,0.08);
    border: 1px solid rgba(234,0,22,0.15);
    border-radius: 12px;
}

.expired-state .expired-message {
    display: inline-block;
}

.expired-state .countdown-timer {
    display: none;
}

/* Loading/Empty states */
.loading-state {
    text-align: center;
    padding: 50px;
    color: var(--text-muted);
}
</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="topbar">
    <div class="left-top">
        <button id="menuToggle" class="menu-btn">☰</button>
        <span class="brand">Privacy Portal</span>
    </div>

    <div class="topbar-right" style="display: flex; align-items: center; gap: 14px;">
        <button class="menu-btn theme-toggle" id="themeToggleBtn" onclick="window.toggleDarkMode()" title="Toggle Theme" type="button"></button>
        <div class="account">
        <button class="account-btn" onclick="toggleAccountMenu()">
            <div class="avatar-small">EA</div>
            <div class="account-info">
                <strong>Eyad Adly</strong>
                <span>Employee</span>
            </div>
        </button>

        <div class="account-menu" id="accountMenu">
            <a href="#">My Profile</a>
            <a href="#">Switch User</a>
            <a href="/">Logout</a>
        </div>
    </div>
</div>
</div>

<div class="sidebar" id="sidebar">
    <a href="/employee-dashboard#profile" id="nav-profile">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </span>
        <span class="label">Profile</span>
    </a>
    <a href="/employee-dashboard#alerts" id="nav-alerts">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </span>
        <span class="label">Flagged Files</span>
    </a>
    <a href="/employee-dashboard#overview" id="nav-overview">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        </span>
        <span class="label">Overview</span>
    </a>
    <a href="/employee-dashboard#actions" id="nav-actions">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </span>
        <span class="label">Actions</span>
    </a>
    <a href="/data-points" id="nav-data-points">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </span>
        <span class="label">Data Points</span>
    </a>
    <a href="/employee-directory" id="nav-employee-directory">
        <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </span>
        <span class="label">File Explorer</span>
    </a>
</div>

<div class="main">

    <section class="hero reveal">
        <h1>User GDPR Profile</h1>
        <p>Complete GDPR Data Profile for <strong id="hero-user-id">{{ employee_id }}</strong></p>
    </section>

    <div id="content-area" class="reveal">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p style="margin-top: 15px;">Loading user profile...</p>
        </div>
    </div>

</div>

<script>
/* ---- UI Toggles ---- */


function toggleAccountMenu() {
    const menu = document.getElementById("accountMenu");
    menu.classList.toggle("show-menu");
}

/* ---- Data Fetching and Rendering ---- */
const employeeId = "{{ employee_id }}";
const contentArea = document.getElementById("content-area");

let countdownInterval = null;

async function loadUserProfile() {
    try {
        const response = await fetch(`/api/user-details/${encodeURIComponent(employeeId)}`);
        if (!response.ok) throw new Error("Failed to load data");
        const data = await response.json();
        renderProfile(data);
    } catch (err) {
        contentArea.innerHTML = `
            <div class="glass-card error-state">
                <p>⚠️ Error loading user data</p>
                <p style="font-weight:400; color: var(--text-muted); font-size:13px; margin-top:8px;">${err.message}</p>
            </div>
        `;
    }
}

function getCategoryIcon(category) {
    category = (category || "").toLowerCase();
    if (category.includes("passport")) return "🛂";
    if (category.includes("financial") || category.includes("bank") || category.includes("iban") || category.includes("salary")) return "🏦";
    if (category.includes("contact") || category.includes("phone") || category.includes("email")) return "📞";
    if (category.includes("id") || category.includes("identity")) return "🆔";
    return "📄";
}

function getStatusClass(status) {
    status = (status || "").toLowerCase();
    if (status === "pending") return "warning";
    if (status === "deleted") return "low";
    return "danger";
}

function renderProfile(data) {
    if (!data.files || data.files.length === 0) {
        contentArea.innerHTML = `
            <div class="glass-card empty-state">
                <div style="font-size: 50px; margin-bottom: 20px; opacity: 0.5;">📂</div>
                <h3>No Data Found</h3>
                <p>There are no files or records associated with this user.</p>
            </div>
        `;
        return;
    }

    let html = `
        <div class="section-header">
            <h2>All User Files & Data</h2>
        </div>
        <div class="user-data-grid">
    `;

    data.files.forEach(file => {
        const hasFindings = file.findings && file.findings.length > 0;
        const cardStyle = hasFindings ? "border: 1px solid rgba(234,0,22,0.25);" : "";
        const badgeHtml = hasFindings 
            ? `<span style="font-size: 11px; margin-left:auto; padding:4px 12px; border-radius:12px; background: rgba(234,0,22,0.12); color: #ff4d6a; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">GDPR VIOLATION</span>` 
            : `<span style="font-size: 11px; margin-left:auto; padding:4px 12px; border-radius:12px; background: rgba(16,185,129,0.12); color: #10b981; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">CLEAN</span>`;
        
        html += `
            <div class="glass-card data-card" style="${cardStyle}">
                <div style="display: flex; align-items: center; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; margin-bottom: 10px;">
                    <h3 style="margin: 0; font-size: 16px;">
                        <span class="category-icon">📄</span> ${escapeHtml(file.file_name)}
                    </h3>
                    ${badgeHtml}
                </div>
                <div style="font-size: 12px; color: var(--text-muted);">
                    <strong>Path:</strong> ${escapeHtml(file.file_path)}<br>
                    <strong>Size:</strong> ${(file.size_bytes / 1024).toFixed(1)} KB<br>
                    <strong>Modified:</strong> ${file.last_modified ? new Date(file.last_modified).toLocaleDateString() : 'Unknown'}
                </div>
        `;

        if (hasFindings) {
            html += `<div style="margin-top: 15px; border-top: 1px solid rgba(234,0,22,0.1); padding-top: 10px;">
                        <strong style="color: #ff4d6a; font-size: 13px; display:block; margin-bottom:8px;">Flagged PII Data:</strong>`;
            
            file.findings.forEach(finding => {
                const icon = getCategoryIcon(finding.category);
                html += `
                    <div style="background: var(--bg-card-hover); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent-red);">
                        <div style="font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text-primary);">${icon} ${finding.category || "Uncategorized"}</div>
                        <div class="data-snippet" style="border-left: none; padding: 8px; font-size: 12px; margin-bottom: 6px;">${finding.flagged_snippet || "N/A"}</div>
                        <div class="data-reasoning" style="font-size: 12px;">${finding.reasoning || "No reasoning provided."}</div>
                    </div>
                `;
            });
            
            html += `</div>`;
        }

        html += `</div>`; // Close card
    });

    html += `</div>`; // Close grid

    // Add Countdown Section
    html += `
        <section class="glass-card gdpr-countdown-section" id="countdown-container">
            <h2>Data Retention Policy</h2>
            <p>Time remaining until mandatory deletion of this user's data according to GDPR guidelines.</p>
            
            <div class="countdown-timer" id="countdown-timer">
                <div class="time-box">
                    <span class="time-value" id="time-days">--</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-hours">--</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-mins">--</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-secs">--</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            
            <div class="expired-message">
                RETENTION PERIOD EXPIRED - IMMEDIATE DELETION REQUIRED
            </div>
        </section>
    `;

    contentArea.innerHTML = html;

    if (data.retention_deadline) {
        startCountdown(new Date(data.retention_deadline));
    } else {
        document.getElementById("countdown-timer").innerHTML = `<div style="font-size: 20px; font-weight: 600; color: var(--text-muted);">No deadline set for this data.</div>`;
    }
}

function startCountdown(deadline) {
    if (countdownInterval) clearInterval(countdownInterval);
    
    // Statically set the timer values to 00 as requested
    document.getElementById("time-days").innerText = "00";
    document.getElementById("time-hours").innerText = "00";
    document.getElementById("time-mins").innerText = "00";
    document.getElementById("time-secs").innerText = "00";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// Initialize
loadUserProfile();

</script>
<script src="/static/js/dashboard.js?v=3"></script>

</body>
</html>
