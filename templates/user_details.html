<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User GDPR Profile — Privacy Portal</title>

<link rel="stylesheet" href="/static/css/dashboard.css">

<style>
/* User Details specific styles */

.user-data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.data-card {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.data-card h3 {
    font-size: 18px;
    color: #1f2937;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.data-card .category-icon {
    font-size: 22px;
}

.data-snippet {
    background: rgba(0,0,0,0.03);
    padding: 12px;
    border-radius: 8px;
    border-left: 3px solid #007bc0;
    font-family: monospace;
    font-size: 13px;
    color: #333;
    word-break: break-all;
}

.data-reasoning {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
}

.data-status {
    margin-top: auto;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* GDPR Countdown Section */

.gdpr-countdown-section {
    margin-top: 60px;
    padding: 40px;
    text-align: center;
    border: 2px solid transparent;
}

.gdpr-countdown-section h2 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #1f2937;
}

.gdpr-countdown-section p {
    color: #666;
    margin-bottom: 30px;
    font-size: 16px;
}

.countdown-timer {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
}

.time-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
}

.time-value {
    font-size: 48px;
    font-weight: 700;
    color: #007bc0;
    line-height: 1;
    margin-bottom: 8px;
}

.time-label {
    font-size: 14px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}

.expired-state .gdpr-countdown-section {
    border-color: #ea0016;
    animation: boschFlow 6s linear infinite;
    background: linear-gradient(90deg, rgba(234,0,22,0.05), rgba(255,255,255,0.8), rgba(234,0,22,0.05));
    background-size: 300% 100%;
}

.expired-state .time-value {
    color: #ea0016;
}

.expired-message {
    display: none;
    font-size: 24px;
    font-weight: 700;
    color: #ea0016;
    margin-top: 20px;
    padding: 15px;
    background: rgba(234,0,22,0.1);
    border-radius: 12px;
}

.expired-state .expired-message {
    display: inline-block;
}

.expired-state .countdown-timer {
    display: none;
}

/* Loading/Empty states */
.loading-state, .empty-state {
    text-align: center;
    padding: 50px;
    color: #666;
}

.empty-state h3 {
    font-size: 20px;
    color: #333;
    margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="topbar">
    <div class="left-top">
        <button id="menuToggle" class="menu-btn">☰</button>
        <span class="brand">Privacy Portal</span>
    </div>

    <div class="account">
        <button class="account-btn" onclick="toggleAccountMenu()">
            <div class="avatar-small">EA</div>
            <div class="account-info">
                <strong>Eyad Adly</strong>
                <span>Employee</span>
            </div>
        </button>

        <div class="account-menu" id="accountMenu">
            <a href="#">My Profile</a>
            <a href="#">Switch User</a>
            <a href="/">Logout</a>
        </div>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <a href="/employee-dashboard">
        <span class="icon">👤</span>
        <span class="label">Profile</span>
    </a>
    <a href="/employee-dashboard#alerts">
        <span class="icon">🚩</span>
        <span class="label">Flagged Files</span>
    </a>
    <a href="/employee-dashboard#overview">
        <span class="icon">📊</span>
        <span class="label">Overview</span>
    </a>
    <a href="/employee-dashboard#actions">
        <span class="icon">⚡</span>
        <span class="label">Actions</span>
    </a>
    <a href="/employee-directory">
        <span class="icon">🔍</span>
        <span class="label">File Explorer</span>
    </a>
</div>

<div class="main">

    <section class="hero">
        <h1>User GDPR Profile</h1>
        <p>Complete GDPR Data Profile for <strong id="hero-user-id">{{ employee_id }}</strong></p>
    </section>

    <div id="content-area">
        <div class="loading-state">
            <div style="font-size: 40px; animation: spin 1s linear infinite; display: inline-block;">⚙️</div>
            <p style="margin-top: 15px;">Loading user profile...</p>
        </div>
    </div>

</div>

<script>
/* ---- UI Toggles ---- */
const menuBtn = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const main = document.querySelector(".main");

menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    main.classList.toggle("expanded");
});

function toggleAccountMenu() {
    const menu = document.getElementById("accountMenu");
    menu.classList.toggle("show-menu");
}

/* ---- Data Fetching and Rendering ---- */
const employeeId = "{{ employee_id }}";
const contentArea = document.getElementById("content-area");

let countdownInterval = null;

async function loadUserProfile() {
    try {
        const response = await fetch(`/api/user-details/${encodeURIComponent(employeeId)}`);
        if (!response.ok) throw new Error("Failed to load data");
        const data = await response.json();
        renderProfile(data);
    } catch (err) {
        contentArea.innerHTML = `
            <div class="glass-card error-state">
                <p>⚠️ Error loading user data</p>
                <p style="font-weight:400; color:#888; font-size:13px; margin-top:8px;">${err.message}</p>
            </div>
        `;
    }
}

function getCategoryIcon(category) {
    category = (category || "").toLowerCase();
    if (category.includes("passport")) return "🛂";
    if (category.includes("financial") || category.includes("bank") || category.includes("iban") || category.includes("salary")) return "🏦";
    if (category.includes("contact") || category.includes("phone") || category.includes("email")) return "📞";
    if (category.includes("id") || category.includes("identity")) return "🆔";
    return "📄";
}

function getStatusClass(status) {
    status = (status || "").toLowerCase();
    if (status === "pending") return "warning";
    if (status === "deleted") return "low"; // 'low' class gives green color in our css
    return "danger";
}

function renderProfile(data) {
    if (!data.files || data.files.length === 0) {
        contentArea.innerHTML = `
            <div class="glass-card empty-state">
                <div style="font-size: 50px; margin-bottom: 20px; opacity: 0.5;">📂</div>
                <h3>No Data Found</h3>
                <p>There are no files or records associated with this user.</p>
            </div>
        `;
        return;
    }

    let html = `
        <div class="section-header">
            <h2>All User Files & Data</h2>
        </div>
        <div class="user-data-grid">
    `;

    data.files.forEach(file => {
        const hasFindings = file.findings && file.findings.length > 0;
        const cardStyle = hasFindings ? "border: 2px solid #ea0016; background: rgba(234,0,22,0.02);" : "";
        const badgeHtml = hasFindings ? `<span class="danger" style="font-size: 12px; margin-left:auto; padding:4px 10px; border-radius:12px; background: rgba(234,0,22,0.1);">GDPR VIOLATION</span>` : `<span style="font-size: 12px; margin-left:auto; padding:4px 10px; border-radius:12px; background: rgba(16,185,129,0.1); color: #10b981; font-weight:600;">CLEAN</span>`;
        
        html += `
            <div class="glass-card data-card" style="${cardStyle}">
                <div style="display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; margin-bottom: 10px;">
                    <h3 style="margin: 0; font-size: 16px;">
                        <span class="category-icon">📄</span> ${escapeHtml(file.file_name)}
                    </h3>
                    ${badgeHtml}
                </div>
                <div style="font-size: 12px; color: #777;">
                    <strong>Path:</strong> ${escapeHtml(file.file_path)}<br>
                    <strong>Size:</strong> ${(file.size_bytes / 1024).toFixed(1)} KB<br>
                    <strong>Modified:</strong> ${file.last_modified ? new Date(file.last_modified).toLocaleDateString() : 'Unknown'}
                </div>
        `;

        if (hasFindings) {
            html += `<div style="margin-top: 15px; border-top: 1px solid rgba(234,0,22,0.1); padding-top: 10px;">
                        <strong style="color: #ea0016; font-size: 13px; display:block; margin-bottom:8px;">Flagged PII Data:</strong>`;
            
            file.findings.forEach(finding => {
                const icon = getCategoryIcon(finding.category);
                html += `
                    <div style="background: rgba(255,255,255,0.6); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #ea0016;">
                        <div style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">${icon} ${finding.category || "Uncategorized"}</div>
                        <div class="data-snippet" style="border-left: none; padding: 8px; font-size: 12px; margin-bottom: 6px;">${finding.flagged_snippet || "N/A"}</div>
                        <div class="data-reasoning" style="font-size: 12px;">${finding.reasoning || "No reasoning provided."}</div>
                    </div>
                `;
            });
            
            html += `</div>`;
        }

        html += `</div>`; // Close card
    });

    html += `</div>`; // Close grid

    // Add Countdown Section
    html += `
        <section class="glass-card gdpr-countdown-section" id="countdown-container">
            <h2>Data Retention Policy</h2>
            <p>Time remaining until mandatory deletion of this user's data according to GDPR guidelines.</p>
            
            <div class="countdown-timer" id="countdown-timer">
                <div class="time-box">
                    <span class="time-value" id="time-days">--</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-hours">--</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-mins">--</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="time-secs">--</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            
            <div class="expired-message">
                RETENTION PERIOD EXPIRED - IMMEDIATE DELETION REQUIRED
            </div>
        </section>
    `;

    contentArea.innerHTML = html;

    if (data.retention_deadline) {
        startCountdown(new Date(data.retention_deadline));
    } else {
        document.getElementById("countdown-timer").innerHTML = `<div style="font-size: 20px; font-weight: 600; color: #555;">No deadline set for this data.</div>`;
    }
}

function startCountdown(deadline) {
    if (countdownInterval) clearInterval(countdownInterval);
    
    // Statically set the timer values to 00 as requested
    document.getElementById("time-days").innerText = "00";
    document.getElementById("time-hours").innerText = "00";
    document.getElementById("time-mins").innerText = "00";
    document.getElementById("time-secs").innerText = "00";
}

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// Initialize
loadUserProfile();

</script>

</body>
</html>
